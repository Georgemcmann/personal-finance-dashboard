<!doctype html>
<html lang="en">
  <head>
    <!-- Character Encoding -->
    <meta charset="UTF-8" />

    <!-- Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Browser Theme -->
    <meta name="theme-color" content="#2563EB" />

    <!-- SEO -->
    <title>ApexFinance Executive Dashboard</title>

    <meta
      name="description"
      content="A modern personal finance dashboard built with React, TypeScript, Tailwind CSS, and Vite. Track expenses, budgets, analytics, and financial insights."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="ApexFinance Executive Dashboard" />
    <meta
      property="og:description"
      content="A modern personal finance dashboard with analytics, budgets, transactions, and reports."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="ApexFinance Executive Dashboard" />
    <meta
      name="twitter:description"
      content="A modern personal finance dashboard built with React and TypeScript."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.png" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="shortcut icon" href="/favicon.ico" />
  </head>

  <body class="bg-slate-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
